<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#244f3a">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Villa il Fanale">
  <title>Gestión Villa il Fanale</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <button class="brand" data-route="inicio" aria-label="Ir al inicio">
        <img src="assets/farol.png" alt="Farol de Villa il Fanale">
        <span><b>VILLA IL FANALE</b><small>Gestión del loft serrano</small></span>
      </button>
      <nav id="desktop-nav" aria-label="Navegación principal"></nav>
      <div class="sidebar-note">
        <span class="eyebrow">ALPA CORRAL</span>
        <p>Tu casa, tus tiempos y cada estadía en un solo lugar.</p>
      </div>
    </aside>

    <div class="main-column">
      <header class="topbar">
        <div>
          <span class="eyebrow" id="page-kicker">HOY EN LA VILLA</span>
          <h1 id="page-title">Buen día, Juan</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="import-calendar" title="Importar calendario" aria-label="Importar calendario">⇩</button>
          <button class="primary-button" id="quick-add">＋ Cargar reserva</button>
        </div>
      </header>
      <main id="app" tabindex="-1"></main>
    </div>
  </div>

  <nav id="mobile-nav" class="mobile-nav" aria-label="Navegación móvil"></nav>
  <div id="modal-root"></div>
  <div id="toast-root" aria-live="polite"></div>
  <input type="file" id="calendar-file" accept=".ics,text/calendar" hidden>
  <script src="app.js?v=7"></script>
</body>
</html>
